name: CI/CD Pipeline — My Epick Book

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t samklin92/my-epick-book:${{ github.sha }} ./app
          docker tag samklin92/my-epick-book:${{ github.sha }} samklin92/my-epick-book:latest

      - name: Push Docker Image
        run: |
          docker push samklin92/my-epick-book:${{ github.sha }}
          docker push samklin92/my-epick-book:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubernetes credentials
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/my-epick-book \
          my-epick-book=samklin92/my-epick-book:${{ github.sha }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/my-epick-book