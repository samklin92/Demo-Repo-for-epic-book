apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-epick-book
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-epick-book
  template:
    metadata:
      labels:
        app: my-epick-book
    spec:
      containers:
        - name: my-epick-book
          image: samklin92/my-epick-book:v1.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-epick-book-svc
spec:
  selector:
    app: my-epick-book
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP